openapi: "3.0.3"
info:
  title: Stock Service API
  version: "1.0.0"
  description: API for managing inventory, stores, promotions, warehouses, and related resources.

paths:
  /api/v1/inventory:
    post:
      summary: Create a new inventory listing
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [store_id, warehouse_id, product_id, base_price]
              properties:
                store_id:     { type: integer, format: int64 }
                warehouse_id: { type: integer, format: int64 }
                product_id:   { type: integer, format: int32 }
                base_price:   { type: number, format: double }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List inventory with optional filters
      tags: [Inventory]
      parameters:
        - name: store_id
          in: query
          schema: { type: integer, format: int64 }
        - name: product_id
          in: query
          schema: { type: integer, format: int32 }
        - name: vendor_sale_status
          in: query
          schema: { type: string }
        - name: system_sale_status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"

  /api/v1/inventory/search:
    get:
      summary: Search inventory by product name
      tags: [Inventory]
      parameters:
        - name: query
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}:
    get:
      summary: Get inventory by ID
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete an inventory item
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/inventory/{id}/promotion:
    post:
      summary: Apply a promotion to an inventory item
      description: "**Role:** salesperson — applies an active promotion to an inventory listing"
      tags: [Inventory]
      x-salesperson: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [promotion_id]
              properties:
                promotion_id: { type: integer, format: int64 }
                final_price:  { type: number, format: double, description: "auto-calculated from promotion rules when omitted or zero" }
                start_at:     { type: string, format: date-time }
                end_at:       { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: Remove a promotion from an inventory item
      description: "**Role:** salesperson — removes the active promotion from an inventory listing"
      tags: [Inventory]
      x-salesperson: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/inventory/{id}/inventory:
    put:
      summary: Update inventory stock quantities
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instant_qty, scheduled_qty, min_order_qty]
              properties:
                instant_qty:   { type: integer }
                scheduled_qty:
                  type: object
                  additionalProperties: { type: integer }
                min_order_qty: { type: integer }
                max_order_qty: { type: integer, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}/vendor/suspend:
    post:
      summary: Suspend vendor sale
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}/vendor/close:
    post:
      summary: Close vendor sale
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}/system/suspend:
    post:
      summary: Suspend system sale
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}/system/close:
    post:
      summary: Close system sale
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/inventory/{id}/reserve:
    post:
      summary: Reserve quantity from inventory
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/inventory/{id}/release:
    post:
      summary: Release reserved quantity back to inventory
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/inventory/{id}/low-stock:
    get:
      summary: Check if inventory is low on stock
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: threshold
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LowStockResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stores:
    get:
      summary: List stores with optional filters
      tags: [Store]
      parameters:
        - name: user_id
          in: query
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreListResponse"
    post:
      summary: Create a new store
      tags: [Store]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, store_name]
              properties:
                user_id:    { type: integer, format: int64 }
                store_name: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stores/{id}:
    get:
      summary: Get store by ID
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update store name
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a store
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "deleted" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stores/{id}/bulk-sale:
    post:
      summary: Toggle bulk sale for a store
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"

  /api/v1/stores/{id}/commission:
    post:
      summary: Toggle commission for a store
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"

  /api/v1/stores/{id}/contact:
    put:
      summary: Update store contact information
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_phone: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"

  /api/v1/stores/{id}/profile:
    put:
      summary: Update store profile (address, media assets)
      tags: [Store]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address_id:   { type: integer, format: int64, nullable: true }
                media_assets: { type: object, additionalProperties: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/products:
    post:
      summary: Create a new product
      tags: [Product]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title_fa, brand_id, category_id]
              properties:
                title_fa:          { type: string }
                title_en:          { type: string }
                description:       { type: string }
                brand_id:          { type: integer, format: int64 }
                category_id:       { type: integer, format: int64 }
                owner_type:        { type: string, enum: [system, user] }
                owner_id:          { type: integer, format: int64, nullable: true }
                is_original:       { type: boolean }
                index_image_file_id: { type: integer, format: int64, nullable: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/products/{id}:
    get:
      summary: Get product by ID
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a product
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int32 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title_fa:          { type: string }
                title_en:          { type: string }
                description:       { type: string }
                brand_id:          { type: integer, format: int64 }
                category_id:       { type: integer, format: int64 }
                index_image_file_id: { type: integer, format: int64, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Soft delete a product
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/products/{id}/activate:
    post:
      summary: Activate a product
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/products/{id}/reject:
    post:
      summary: Reject a product
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/promotions:
    post:
      summary: Create a promotion
      description: "**Role:** admin — creates a promotion with discount rules, eligibility, and budget"
      tags: [Promotion]
      x-admin: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromotionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List promotions
      description: "**Role:** admin — list and filter promotions"
      tags: [Promotion]
      x-admin: true
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
        - name: discount_type
          in: query
          schema: { type: string, enum: [percentage, fixed_amount] }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionListResponse"

  /api/v1/promotions/{id}:
    get:
      summary: Get promotion by ID
      description: "**Role:** admin — view a single promotion's details"
      tags: [Promotion]
      x-admin: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a promotion
      description: "**Role:** admin — partial update of a promotion's fields"
      tags: [Promotion]
      x-admin: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromotionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a promotion
      description: "**Role:** admin — permanently removes a promotion"
      tags: [Promotion]
      x-admin: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "deleted" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/promotions/{id}/activate:
    post:
      summary: Activate a promotion
      description: "**Role:** salesperson — makes a promotion available for use"
      tags: [Promotion]
      x-salesperson: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "activated" }

  /api/v1/promotions/{id}/deactivate:
    post:
      summary: Deactivate a promotion
      description: "**Role:** salesperson — makes a promotion unavailable for use"
      tags: [Promotion]
      x-salesperson: true
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "deactivated" }

  /api/v1/reference-prices:
    post:
      summary: Create a reference price for a product
      tags: [Reference Price]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, price, source]
              properties:
                product_id: { type: integer, format: int32 }
                price:      { type: number, format: double }
                source:     { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferencePriceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List/filter reference prices
      tags: [Reference Price]
      parameters:
        - name: product_id
          in: query
          schema: { type: integer, format: int32 }
        - name: source
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferencePriceListResponse"

  /api/v1/reference-prices/{id}:
    get:
      summary: Get reference price by ID
      tags: [Reference Price]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferencePriceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a reference price
      tags: [Reference Price]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "deleted" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reference-prices/by-product/{productId}:
    get:
      summary: Get reference price by product ID
      tags: [Reference Price]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferencePriceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reference-prices/by-product/{productId}/validate:
    get:
      summary: Compare reference price with inventory base price for validation
      tags: [Reference Price]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer, format: int32 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
