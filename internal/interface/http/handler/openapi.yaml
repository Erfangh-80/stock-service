components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    InventoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryResponse"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    LowStockResponse:
      type: object
      properties:
        is_low:
          type: boolean
        current_qty:
          type: integer

    InventoryResponse:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        StoreID:
          type: integer
          format: int64
        WarehouseID:
          type: integer
          format: int64
        ProductID:
          type: integer
          format: int32
        SaleModel:
          type: string
        BasePrice:
          type: number
          format: double
        PromotionID:
          type: integer
          format: int64
          nullable: true
        FinalPrice:
          type: number
          format: double
          nullable: true
        StartAt:
          type: string
          format: date-time
          nullable: true
        EndAt:
          type: string
          format: date-time
          nullable: true
        PromotionStatus:
          type: string
        InstantQty:
          type: integer
        MinOrderQty:
          type: integer
        MaxOrderQty:
          type: integer
          nullable: true
        Condition:
          type: string
        VendorSaleStatus:
          type: string
        SystemSaleStatus:
          type: string
        CreatedAt:
          type: string
          format: date-time

    StoreResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        store_name:
          type: string
        status:
          type: string
        address_id:
          type: integer
          format: int64
          nullable: true
        contact_phone:
          type: string
          nullable: true
        media_assets:
          type: object
          additionalProperties: true
        is_commission_applicable:
          type: boolean
        is_bulk_sale_enabled:
          type: boolean
        created_at:
          type: string

    StoreListResponse:
      type: object
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/StoreResponse"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CreatePromotionRequest:
      type: object
      required: [title, discount_type, discount_value]
      properties:
        title:                    { type: string }
        discount_type:            { type: string, enum: [percentage, fixed_amount] }
        discount_value:           { type: number, format: double }
        min_purchase:             { type: number, format: double, nullable: true }
        coupon_code:              { type: string, nullable: true }
        usage_limit:              { type: integer, nullable: true }
        max_discount_amount:      { type: number, format: double, nullable: true, description: "cap for percentage discounts" }
        budget:                   { type: number, format: double, nullable: true }
        eligible_store_ids:       { type: array, items: { type: integer, format: int64 } }
        eligible_category_ids:    { type: array, items: { type: integer, format: int64 } }
        eligible_product_ids:     { type: array, items: { type: integer, format: int32 } }
        eligible_user_ids:        { type: array, items: { type: integer, format: int64 } }
        requires_approval:        { type: boolean }
        start_at:                 { type: string, format: date-time, nullable: true }
        end_at:                   { type: string, format: date-time, nullable: true }
        is_countdown:             { type: boolean }
        expire_sale_with_promotion: { type: boolean }

    UpdatePromotionRequest:
      type: object
      properties:
        title:                    { type: string }
        discount_type:            { type: string, enum: [percentage, fixed_amount] }
        discount_value:           { type: number, format: double }
        min_purchase:             { type: number, format: double, nullable: true }
        coupon_code:              { type: string, nullable: true }
        usage_limit:              { type: integer, nullable: true }
        max_discount_amount:      { type: number, format: double, nullable: true }
        budget:                   { type: number, format: double, nullable: true }
        eligible_store_ids:       { type: array, items: { type: integer, format: int64 } }
        eligible_category_ids:    { type: array, items: { type: integer, format: int64 } }
        eligible_product_ids:     { type: array, items: { type: integer, format: int32 } }
        eligible_user_ids:        { type: array, items: { type: integer, format: int64 } }
        requires_approval:        { type: boolean }
        start_at:                 { type: string, format: date-time, nullable: true }
        end_at:                   { type: string, format: date-time, nullable: true }
        is_countdown:             { type: boolean }
        expire_sale_with_promotion: { type: boolean }

    PromotionListResponse:
      type: object
      properties:
        promotions:
          type: array
          items:
            type: object
            properties:
              id:             { type: integer, format: int64 }
              title:          { type: string }
              discount_type:  { type: string }
              discount_value: { type: number, format: double }
              status:         { type: string }
              start_at:       { type: string, format: date-time, nullable: true }
              end_at:         { type: string, format: date-time, nullable: true }
              created_at:     { type: string, format: date-time }
        total:  { type: integer }
        page:   { type: integer }
        limit:  { type: integer }

    PromotionResponse:
      type: object
      properties:
        id:                       { type: integer, format: int64 }
        title:                    { type: string }
        discount_type:            { type: string }
        discount_value:           { type: number, format: double }
        min_purchase:             { type: number, format: double, nullable: true }
        coupon_code:              { type: string, nullable: true }
        usage_limit:              { type: integer, nullable: true }
        used_count:               { type: integer }
        max_discount_amount:      { type: number, format: double, nullable: true }
        budget:                   { type: number, format: double, nullable: true }
        budget_spent:             { type: number, format: double }
        eligible_store_ids:       { type: array, items: { type: integer, format: int64 } }
        eligible_category_ids:    { type: array, items: { type: integer, format: int64 } }
        eligible_product_ids:     { type: array, items: { type: integer, format: int32 } }
        eligible_user_ids:        { type: array, items: { type: integer, format: int64 } }
        requires_approval:        { type: boolean }
        start_at:                 { type: string, format: date-time, nullable: true }
        end_at:                   { type: string, format: date-time, nullable: true }
        is_countdown:             { type: boolean }
        expire_sale_with_promotion: { type: boolean }
        status:                   { type: string }
        created_at:               { type: string, format: date-time }

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        title_fa:
          type: string
        title_en:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        brand_id:
          type: integer
          format: int64
        category_id:
          type: integer
          format: int64
        owner_type:
          type: string
        owner_id:
          type: integer
          format: int64
          nullable: true
        is_original:
          type: boolean
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        index_image_file_id:
          type: integer
          format: int64
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true

    ReferencePriceResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int32
        price:
          type: number
          format: double
        source:
          type: string
        created_at:
          type: string
          format: date-time

    ReferencePriceListResponse:
      type: object
      properties:
        reference_prices:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              product_id:
                type: integer
                format: int32
              price:
                type: number
                format: double
              source:
                type: string
              created_at:
                type: string
                format: date-time
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ReferencePriceValidationResponse:
      type: object
      properties:
        product_id:
          type: integer
          format: int32
        reference_price_id:
          type: integer
          format: int64
        reference_price:
          type: number
          format: double
        source:
          type: string
        inventory_count:
          type: integer
        base_prices:
          type: array
          items:
            type: number
            format: double
        comparison:
          type: string
          enum: [within_range, moderately_out_of_range, far_out_of_range, no_inventory]

    SalesCommissionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        inventory_id:
          type: integer
          format: int64
        category_commission_rule_id:
          type: integer
          format: int64
        sale_model:
          type: string
        rate_percent:
          type: number
          format: double
        min_qty:
          type: integer
          nullable: true
        min_price:
          type: number
          format: double
        max_price:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time

    SalesCommissionListResponse:
      type: object
      properties:
        commissions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              inventory_id:
                type: integer
                format: int64
              sale_model:
                type: string
              rate_percent:
                type: number
                format: double
              min_price:
                type: number
                format: double
              created_at:
                type: string
                format: date-time
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CommissionCalculationResponse:
      type: object
      properties:
        commission_id:
          type: integer
          format: int64
        inventory_id:
          type: integer
          format: int64
        base_price_used:
          type: number
          format: double
        quantity:
          type: integer
        rate_percent:
          type: number
          format: double
        commission_amt:
          type: number
          format: double
        price_source:
          type: string
          enum: [base_price, final_price]

    CategoryCommissionRuleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        category_id:
          type: integer
          format: int32
        rate_percent:
          type: number
          format: double
        min_price:
          type: number
          format: double
        max_price:
          type: number
          format: double
          nullable: true
        is_active:
          type: boolean
